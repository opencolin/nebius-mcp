name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ matrix.python }}

      - name: Lint (ruff)
        run: uv run --python ${{ matrix.python }} ruff check .

      - name: Format check (ruff)
        run: uv run --python ${{ matrix.python }} ruff format --check .

      - name: Type check (mypy)
        run: uv run --python ${{ matrix.python }} mypy src

      - name: Unit tests (pytest)
        run: uv run --python ${{ matrix.python }} pytest tests/unit -v

  security-scan:
    name: security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
